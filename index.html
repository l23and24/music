<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конкурс Віртуальна Фізика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
        }
        .playing {
            border-color: #0ea5e9 !important;
            background: rgba(14, 165, 233, 0.1) !important;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.15);
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-fill {
            height: 100%;
            background: #0ea5e9;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased">
    <div class="container mx-auto px-4 py-12 max-w-3xl">
        <header class="text-center mb-12">
            <div class="inline-block p-4 rounded-2xl bg-blue-500/20 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold text-white mb-3">Віртуальна фізика</h1>
            <p class="text-slate-400">Оберіть композицію для прослуховування</p>
        </header>

        <div id="playlist" class="space-y-4">
            <!-- Треки завантажуються скриптом -->
        </div>

        <script>
            const tracks = ["1688", "24736", "113215", "119474", "159835", "210711", "233843", "275416"];
            const container = document.getElementById('playlist');
            
            // Визначаємо базу шляху для GitHub Pages
            const currentPath = window.location.pathname;
            const directory = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
            const baseUrl = window.location.origin + directory;

            container.innerHTML = tracks.map((id, index) => `
                <div class="glass-card p-5 rounded-2xl flex flex-col" id="card-${id}" onclick="handleTrackClick('${id}')">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <span class="text-2xl font-black text-slate-600 font-mono">${(index + 1).toString().padStart(2, '0')}</span>
                            <div>
                                <h3 class="text-lg font-bold text-white leading-tight">Композиція ${id}</h3>
                                <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Аудіозапис</p>
                            </div>
                        </div>
                        <div id="badge-${id}" class="status-badge bg-slate-800 text-slate-400">ГОТОВО</div>
                    </div>
                    <div class="progress-bar">
                        <div id="fill-${id}" class="progress-fill"></div>
                    </div>
                    <audio id="audio-${id}" preload="none"></audio>
                </div>
            `).join('');

            function handleTrackClick(id) {
                const audio = document.getElementById('audio-' + id);
                const card = document.getElementById('card-' + id);
                const badge = document.getElementById('badge-' + id);
                const fill = document.getElementById('fill-' + id);

                if (audio.paused || audio.ended) {
                    // Зупиняємо інші треки
                    document.querySelectorAll('audio').forEach(a => {
                        a.pause();
                        const otherId = a.id.replace('audio-', '');
                        const b = document.getElementById('badge-' + otherId);
                        if (b.innerText !== "ВІДСУТНІЙ") {
                            b.innerText = "ГОТОВО";
                            b.className = "status-badge bg-slate-800 text-slate-400";
                        }
                        document.getElementById('card-' + otherId).classList.remove('playing');
                    });

                    badge.innerText = "ЧЕКАЙТЕ...";
                    badge.className = "status-badge bg-blue-500/20 text-blue-400 animate-pulse";
                    
                    // Оновлюємо джерело з унікальним параметром для обходу кешу
                    const fileUrl = `${baseUrl}${id}.mp3?v=${Date.now()}`;
                    audio.src = fileUrl;
                    audio.load();

                    const playPromise = audio.play();

                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            card.classList.add('playing');
                            badge.innerText = "ГРАЄ";
                            badge.className = "status-badge bg-green-500/20 text-green-400";
                            badge.classList.remove('animate-pulse');
                        }).catch(error => {
                            console.error("Play error:", error);
                            badge.innerText = "ПОМИЛКА";
                            badge.className = "status-badge bg-red-500/20 text-red-400";
                        });
                    }
                } else {
                    audio.pause();
                    card.classList.remove('playing');
                    badge.innerText = "ПАУЗА";
                    badge.className = "status-badge bg-slate-800 text-slate-400";
                }

                // Оновлення прогресу
                audio.ontimeupdate = () => {
                    if (audio.duration) {
                        const progress = (audio.currentTime / audio.duration) * 100;
                        fill.style.width = progress + "%";
                    }
                };

                audio.onended = () => {
                    card.classList.remove('playing');
                    badge.innerText = "ГОТОВО";
                    fill.style.width = "0%";
                };

                audio.onerror = () => {
                    badge.innerText = "ВІДСУТНІЙ";
                    badge.className = "status-badge bg-red-600 text-white";
                    badge.classList.remove('animate-pulse');
                };
            }
        </script>

        <footer class="mt-16 text-center text-slate-600 text-xs tracking-widest uppercase">
            Фізичний кабінет • 2024
        </footer>
    </div>
</body>
</html>
