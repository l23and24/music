<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конкурс Віртуальна Фізика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(56, 189, 248, 0.5);
        }
        audio {
            width: 100%;
            height: 54px;
            margin-top: 15px;
            border-radius: 12px;
            display: block;
        }
        .playing {
            border-color: #0ea5e9 !important;
            background: rgba(14, 165, 233, 0.15) !important;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }
        .error-track {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.1) !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased">
    <div class="container mx-auto px-4 py-8 md:py-16 max-w-4xl">
        <header class="text-center mb-12 md:mb-20">
            <div class="inline-flex p-5 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 mb-8 shadow-2xl shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 md:h-16 md:w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.691.387a2 2 0 01-1.132.252 2 2 0 01-1.132-.252l-.69-.387a6 6 0 00-3.86-.517l-2.387.477a2 2 0 00-1.022.547M12 10V2m0 8l-3-3m3 3l3-3" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white mb-4">
                Конкурс "Віртуальна фізика"
            </h1>
            <p class="text-xl md:text-2xl text-slate-300 font-light" id="status-msg">
                Натисніть на картку для відтворення звуку
            </p>
        </header>

        <main class="grid grid-cols-1 gap-8" id="playlist">
            <!-- Треки будуть згенеровані скриптом нижче -->
        </main>

        <footer class="mt-20 mb-10 text-center">
            <div class="h-px w-32 bg-gradient-to-r from-transparent via-blue-400 to-transparent mx-auto mb-8 opacity-30"></div>
            <p class="text-slate-400 text-sm md:text-base uppercase tracking-[0.4em] font-medium">
                Онлайн-кабінет фізики 229 &bull; 2024
            </p>
        </footer>
    </div>

    <script>
        const tracks = ["1688", "24736", "113215", "119474", "159835", "210711", "233843", "275416"];
        const playlistContainer = document.getElementById('playlist');

        // Генеруємо HTML
        playlistContainer.innerHTML = tracks.map((id, index) => `
            <div class="glass-card p-6 md:p-10 rounded-3xl shadow-lg" id="card-${id}" onclick="playTrack('${id}')">
                <div class="flex items-center space-x-6 mb-4">
                    <span class="text-blue-400 font-black text-2xl md:text-4xl opacity-50 font-mono w-12 text-center">
                        ${(index + 1).toString().padStart(2, '0')}
                    </span>
                    <div class="flex flex-col">
                        <span class="text-xs md:text-sm uppercase tracking-[0.3em] text-blue-300 mb-1 font-bold">Аудіосупровід</span>
                        <h2 class="text-2xl md:text-4xl font-bold text-white">Композиція ${id}</h2>
                    </div>
                </div>
                
                <div class="bg-black/20 p-4 rounded-2xl">
                    <audio id="audio-${id}" preload="metadata" onclick="event.stopPropagation()">
                        <source src="${id}.mp3" type="audio/mpeg">
                        Ваш браузер не підтримує аудіо.
                    </audio>
                    <div class="flex items-center justify-between mt-2 px-2">
                        <span class="text-xs text-slate-400" id="time-${id}">0:00</span>
                        <span class="text-xs text-blue-400 font-bold" id="label-${id}">ГОТОВО</span>
                    </div>
                </div>
            </div>
        `).join('');

        function playTrack(id) {
            const currentAudio = document.getElementById('audio-' + id);
            const currentCard = document.getElementById('card-' + id);
            const label = document.getElementById('label-' + id);
            const allAudios = document.querySelectorAll('audio');
            const allCards = document.querySelectorAll('.glass-card');

            if (currentAudio.paused) {
                // Зупиняємо все інше
                allAudios.forEach(a => { 
                    a.pause(); 
                });
                allCards.forEach(c => c.classList.remove('playing'));

                // Спроба відтворення
                label.innerText = "ЗАВАНТАЖЕННЯ...";
                
                currentAudio.play().then(() => {
                    currentCard.classList.add('playing');
                    label.innerText = "ГРАЄ";
                }).catch(error => {
                    console.error("Помилка:", error);
                    label.innerText = "ПОМИЛКА ФАЙЛУ";
                    currentCard.classList.add('error-track');
                    document.getElementById('status-msg').innerText = "Помилка: файл " + id + ".mp3 не знайдено в папці";
                });
            } else {
                currentAudio.pause();
                currentCard.classList.remove('playing');
                label.innerText = "ПАУЗА";
            }
        }

        // Оновлення часу
        tracks.forEach(id => {
            const a = document.getElementById('audio-' + id);
            const t = document.getElementById('time-' + id);
            a.ontimeupdate = () => {
                const min = Math.floor(a.currentTime / 60);
                const sec = Math.floor(a.currentTime % 60);
                t.innerText = min + ":" + (sec < 10 ? '0' : '') + sec;
            };
            // Перевірка наявності файлу при завантаженні сторінки
            a.onerror = () => {
                document.getElementById('label-' + id).innerText = "ВІДСУТНІЙ";
                document.getElementById('card-' + id).classList.add('error-track');
            };
        });
    </script>
</body>
</html>
