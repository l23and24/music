<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конкурс Віртуальна Фізика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(56, 189, 248, 0.5);
        }
        audio {
            width: 100%;
            height: 40px;
            margin-top: 10px;
            border-radius: 8px;
        }
        .playing {
            border-color: #0ea5e9 !important;
            background: rgba(14, 165, 233, 0.15) !important;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.2);
        }
        .error-track {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.1) !important;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased">
    <div class="container mx-auto px-4 py-8 md:py-16 max-w-4xl">
        <header class="text-center mb-12 md:mb-20">
            <div class="inline-flex p-5 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 mb-8 shadow-2xl shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 md:h-16 md:w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white mb-4">
                Конкурс "Віртуальна фізика"
            </h1>
            <p class="text-xl md:text-2xl text-slate-300 font-light" id="status-msg">
                Натисніть на картку для запуску треку
            </p>
        </header>

        <main class="grid grid-cols-1 gap-6" id="playlist">
            <!-- Сюди скрипт вставить треки -->
        </main>

        <footer class="mt-20 mb-10 text-center opacity-50">
            <p class="text-sm uppercase tracking-widest font-medium">Онлайн-кабінет фізики 229</p>
        </footer>
    </div>

    <script>
        const tracks = ["1688", "24736", "113215", "119474", "159835", "210711", "233843", "275416"];
        const playlistContainer = document.getElementById('playlist');
        
        // Отримуємо базовий URL сторінки (щоб посилання були абсолютними)
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

        playlistContainer.innerHTML = tracks.map((id, index) => `
            <div class="glass-card p-6 rounded-3xl" id="card-${id}" onclick="togglePlay('${id}')">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-blue-500 font-mono text-2xl opacity-40">${(index + 1).toString().padStart(2, '0')}</span>
                        <div>
                            <p class="text-xs text-blue-400 font-bold uppercase tracking-tighter">Аудіозапис</p>
                            <h2 class="text-xl md:text-2xl font-bold text-white">Композиція ${id}</h2>
                        </div>
                    </div>
                    <div id="badge-${id}" class="status-badge bg-slate-700 text-slate-400">Очікування</div>
                </div>
                
                <div class="mt-4 pointer-events-none">
                    <audio id="audio-${id}" preload="none">
                        <source src="${baseUrl}${id}.mp3" type="audio/mpeg">
                    </audio>
                    <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                        <div id="progress-${id}" class="h-full bg-blue-500 w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        `).join('');

        function togglePlay(id) {
            const audio = document.getElementById('audio-' + id);
            const card = document.getElementById('card-' + id);
            const badge = document.getElementById('badge-' + id);
            const progress = document.getElementById('progress-' + id);

            if (audio.paused) {
                // Зупиняємо всі інші
                document.querySelectorAll('audio').forEach(a => {
                    a.pause();
                    const otherId = a.id.replace('audio-', '');
                    document.getElementById('card-' + otherId).classList.remove('playing');
                    document.getElementById('badge-' + otherId).innerText = "Очікування";
                    document.getElementById('badge-' + otherId).className = "status-badge bg-slate-700 text-slate-400";
                });

                badge.innerText = "Завантаження...";
                badge.className = "status-badge bg-blue-500/20 text-blue-400 animate-pulse";
                
                audio.play().then(() => {
                    card.classList.add('playing');
                    badge.innerText = "Грає";
                    badge.className = "status-badge bg-green-500/20 text-green-400";
                }).catch(err => {
                    badge.innerText = "Помилка файлу";
                    badge.className = "status-badge bg-red-500/20 text-red-400";
                    card.classList.add('error-track');
                    console.error("Audio error:", err);
                });
            } else {
                audio.pause();
                card.classList.remove('playing');
                badge.innerText = "Пауза";
                badge.className = "status-badge bg-slate-700 text-slate-400";
            }

            audio.ontimeupdate = () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = pct + "%";
            };
        }

        // Обробка помилок завантаження
        tracks.forEach(id => {
            const a = document.getElementById('audio-' + id);
            a.onerror = () => {
                const badge = document.getElementById('badge-' + id);
                badge.innerText = "Файл не знайдено";
                badge.className = "status-badge bg-red-600 text-white";
            };
        });
    </script>
</body>
</html>
