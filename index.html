<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конкурс Віртуальна Фізика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(56, 189, 248, 0.5);
        }
        /* Стилізація плеєра для смарт-дошки */
        audio {
            width: 100%;
            height: 54px;
            margin-top: 15px;
            /* Прибираємо інверсію кольорів, яка могла робити його сірим */
            border-radius: 12px;
        }
        /* Додаємо підсвітку активного треку */
        .playing {
            border-color: #38bdf8 !important;
            background: rgba(56, 189, 248, 0.1) !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased">
    <div class="container mx-auto px-4 py-8 md:py-16 max-w-4xl">
        <!-- Заголовок -->
        <header class="text-center mb-12 md:mb-20">
            <div class="inline-flex p-5 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 mb-8 shadow-2xl shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 md:h-16 md:w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.691.387a2 2 0 01-1.132.252 2 2 0 01-1.132-.252l-.69-.387a6 6 0 00-3.86-.517l-2.387.477a2 2 0 00-1.022.547M12 10V2m0 8l-3-3m3 3l3-3" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white mb-4">
                Конкурс "Віртуальна фізика"
            </h1>
            <p class="text-xl md:text-2xl text-slate-300 font-light">
                Натисніть на картку або Play для відтворення
            </p>
        </header>

        <!-- Список з вбудованими плеєрами -->
        <main class="grid grid-cols-1 gap-8" id="playlist">
            <script>
                const tracks = ["1688", "24736", "113215", "119474", "159835", "210711", "233843", "275416"];
                
                document.write(tracks.map((id, index) => `
                    <div class="glass-card p-6 md:p-10 rounded-3xl shadow-lg" onclick="playTrack('${id}', this)">
                        <div class="flex items-center space-x-6 mb-4">
                            <span class="text-blue-400 font-black text-2xl md:text-4xl opacity-50 font-mono w-12">
                                ${(index + 1).toString().padStart(2, '0')}
                            </span>
                            <div class="flex flex-col">
                                <span class="text-xs md:text-sm uppercase tracking-[0.3em] text-blue-300 mb-1 font-bold">Аудіозапис</span>
                                <h2 class="text-2xl md:text-4xl font-bold text-white">Композиція ${id}</h2>
                            </div>
                        </div>
                        
                        <div class="bg-black/20 p-4 rounded-2xl">
                            <audio id="audio-${id}" controls preload="metadata" onclick="event.stopPropagation()">
                                <source src="${id}.mp3" type="audio/mpeg">
                                Ваш браузер не підтримує елемент аудіо.
                            </audio>
                        </div>
                    </div>
                `).join(''));

                function playTrack(id, element) {
                    const allAudios = document.querySelectorAll('audio');
                    const allCards = document.querySelectorAll('.glass-card');
                    const currentAudio = document.getElementById('audio-' + id);

                    // Скидаємо стилі всіх карток
                    allCards.forEach(card => card.classList.remove('playing'));

                    if (currentAudio.paused) {
                        // Зупиняємо всі інші
                        allAudios.forEach(a => { a.pause(); a.currentTime = 0; });
                        // Запускаємо поточний
                        currentAudio.play().catch(error => {
                            console.error("Помилка відтворення:", error);
                        });
                        element.classList.add('playing');
                    } else {
                        currentAudio.pause();
                    }
                }
            </script>
        </main>

        <footer class="mt-20 mb-10 text-center">
            <div class="h-px w-32 bg-gradient-to-r from-transparent via-blue-400 to-transparent mx-auto mb-8 opacity-30"></div>
            <p class="text-slate-400 text-sm md:text-base uppercase tracking-[0.4em] font-medium">
                Онлайн-кабінет фізики 229
            </p>
        </footer>
    </div>

    <script>
        // Додаткова логіка зупинки через стандартні контролери
        document.addEventListener('play', function(e){
            const audios = document.getElementsByTagName('audio');
            for(let i = 0; i < audios.length; i++){
                if(audios[i] != e.target){
                    audios[i].pause();
                }
            }
            // Додаємо клас підсвітки картці при натисканні прямо на плеєр
            e.target.closest('.glass-card').classList.add('playing');
        }, true);

        document.addEventListener('pause', function(e){
            e.target.closest('.glass-card').classList.remove('playing');
        }, true);
    </script>
</body>
</html>
